---

- name: Create rustfs group
  ansible.builtin.group:
    name: "{{ rustfs_group }}"
    state: present

- name: Create rustfs user
  ansible.builtin.user:
    name: "{{ rustfs_user }}"
    group: "{{ rustfs_group }}"
    system: "yes"
    shell: "/usr/sbin/nologin"

- name: Create the rustfs config directory
  ansible.builtin.file:
    path: "{{ rustfs_etc_dir }}"
    state: directory
    owner: "{{ rustfs_user }}"
    group: "{{ rustfs_group }}"
    mode: "0750"

- name: Create the rustfs data storage directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ rustfs_user }}"
    group: "{{ rustfs_group }}"
    mode: "0750"
  when: rustfs_server_make_datadirs
  with_items: "{{ rustfs_server_datadirs }}"

- name: Create the rustfs log directory
  ansible.builtin.file:
    path: "{{ rustfs_log_dir }}"
    state: directory
    owner: "{{ rustfs_user }}"
    group: "{{ rustfs_group }}"
    mode: "0750"

- name: Create the rustfs TLS directory
  ansible.builtin.file:
    path: "{{ rustfs_tls_path }}"
    state: directory
    owner: "{{ rustfs_user }}"
    group: "{{ rustfs_group }}"
    mode: "0750"
  when: rustfs_enable_tls

- name: Check if rustfs server binary is already installed
  ansible.builtin.stat:
    path: "{{ rustfs_server_bin }}"
  register: _server_binary

- name: Get installed rustfs server version
  ansible.builtin.command: "{{ rustfs_server_bin }} --version"
  register: _server_version_output
  changed_when: false
  failed_when: false
  when: _server_binary.stat.exists

- name: Determine if server needs (re)installation
  ansible.builtin.set_fact:
    _server_needs_install: true
  when: >-
    not _server_binary.stat.exists
    or _server_version_output.rc != 0
    or rustfs_server_version not in _server_version_output.stdout

- name: Compose the rustfs server asset name
  ansible.builtin.set_fact:
    _rustfs_server_asset: "rustfs-linux-{{ rustfs_server_arch }}-{{ rustfs_libc_suffix }}-latest.zip"
  when: _server_needs_install | default(false) | bool

- name: Compose the rustfs server download url
  ansible.builtin.set_fact:
    _rustfs_server_download_url: "{{ rustfs_download_base_url }}/{{ rustfs_server_version }}/{{ _rustfs_server_asset }}"
  when: _server_needs_install | default(false) | bool

- name: Download SHA256SUMS for checksum verification
  ansible.builtin.get_url:
    url: "{{ rustfs_download_base_url }}/{{ rustfs_server_version }}/SHA256SUMS"
    dest: "/tmp/rustfs-SHA256SUMS"
    owner: "root"
    group: "root"
    mode: "0644"
  register: _download_checksums
  until: _download_checksums is succeeded
  retries: 5
  delay: 2
  when: _server_needs_install | default(false) | bool

- name: Extract checksum for server binary
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      grep '{{ _rustfs_server_asset }}' /tmp/rustfs-SHA256SUMS | awk '{print $1}'
  register: _server_checksum_raw
  changed_when: false
  when: _server_needs_install | default(false) | bool

- name: Set server checksum fact
  ansible.builtin.set_fact:
    _rustfs_server_checksum: "{{ _server_checksum_raw.stdout }}"
  when: _server_needs_install | default(false) | bool

- name: Download the rustfs server binary
  ansible.builtin.get_url:
    url: "{{ _rustfs_server_download_url }}"
    dest: "/tmp/{{ _rustfs_server_asset }}"
    checksum: "sha256:{{ _rustfs_server_checksum }}"
    owner: "root"
    group: "root"
    mode: "0644"
  register: _download_server
  until: _download_server is succeeded
  retries: 5
  delay: 2
  when: _server_needs_install | default(false) | bool

- name: Install unzip package
  ansible.builtin.package:
    name: unzip
    state: present
  when: _server_needs_install | default(false) | bool

- name: Extract rustfs server binary from zip
  ansible.builtin.unarchive:
    src: "/tmp/{{ _rustfs_server_asset }}"
    dest: "/tmp"
    remote_src: true
    creates: "/tmp/rustfs"
  register: _extract_server
  when: _server_needs_install | default(false) | bool

- name: Install rustfs server binary
  ansible.builtin.copy:
    src: "/tmp/rustfs"
    dest: "{{ rustfs_server_bin }}"
    owner: "root"
    group: "root"
    mode: "0755"
    remote_src: true
  notify: Restart rustfs
  when: _server_needs_install | default(false) | bool

- name: Clean up temporary files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/{{ _rustfs_server_asset }}"
    - "/tmp/rustfs"
    - "/tmp/rustfs-SHA256SUMS"
  changed_when: false
  when: _server_needs_install | default(false) | bool

- name: Generate the rustfs server envfile
  ansible.builtin.template:
    src: rustfs.env.j2
    dest: "{{ rustfs_server_envfile }}"
    owner: "{{ rustfs_user }}"
    group: "{{ rustfs_group }}"
    mode: "0640"
  notify: Restart rustfs

- name: Create the rustfs server systemd config
  ansible.builtin.template:
    src: rustfs.service.j2
    dest: "/etc/systemd/system/rustfs.service"
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - Reload rustfs systemd
    - Restart rustfs

- name: Copy TLS private key file
  ansible.builtin.copy:
    dest: "{{ rustfs_tls_path }}/rustfs_key.pem"
    content: "{{ rustfs_tls_key }}"
    owner: "{{ rustfs_user }}"
    group: "{{ rustfs_user }}"
    mode: "0640"
  become: true
  when: rustfs_enable_tls and (rustfs_tls_key | default("")) != ""
  notify: Restart rustfs

- name: Copy TLS cert file
  ansible.builtin.copy:
    dest: "{{ rustfs_tls_path }}/rustfs_cert.pem"
    content: "{{ rustfs_tls_cert }}"
    owner: "{{ rustfs_user }}"
    group: "{{ rustfs_user }}"
    mode: "0640"
  become: true
  when: rustfs_enable_tls and (rustfs_tls_cert | default("")) != ""
  notify: Restart rustfs

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure rustfs is started at boot
  ansible.builtin.service:
    name: rustfs
    enabled: true
    state: started

- name: Set secure rustfs url if not defined
  ansible.builtin.set_fact:
    rustfs_url: "https://{{ rustfs_server_addr | default('127.0.0.1', true) }}:{{ rustfs_server_port }}"
  when: rustfs_enable_tls and rustfs_url | length == 0

- name: Set unsecure rustfs url if not defined
  ansible.builtin.set_fact:
    rustfs_url: "http://{{ rustfs_server_addr | default('127.0.0.1', true) }}:{{ rustfs_server_port }}"
  when: not rustfs_enable_tls and rustfs_url | length == 0
